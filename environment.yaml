name: SGPO
channels:
  - conda-forge
  - defaults
  - bioconda  # for mafft and mmseqs2
dependencies:
  - python=3.9
  - lightning
  - transformers
  - wandb
  - ipykernel
  - biopython
  - mmseqs2
  - mafft
  - timm
  - botorch
  - pip
  - seaborn
  - torch-scatter # for later installation of evodiff
  - pip:
      - hydra-core
      - numpy
      - torch  # handled via conda for GPU compatibility if needed
      - evodiff
      - flash-attn
  