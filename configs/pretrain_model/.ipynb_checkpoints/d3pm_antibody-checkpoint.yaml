name: d3pm_antibody
model:
  _target_: models.pretraining.model.d3pm_evodiff.ByteNetDiffusion
  model_config:
    name: d3pm_antibody
    _lambda: 0
    mask: uniform
    device: cuda
    pretrained_evodiff_ckpt:
  
  network:
    _target_: evodiff.model.ByteNetLMTime
    d_embedding: 8
    d_model: 1024
    n_layers: 16
    kernel_size: 5
    r: 128
    causal: False
    rank:
    dropout: 0.0
    tie_weights: False
    final_ln: False
    slim: True
    activation: gelu
    timesteps: 500
  tokenizer:
    _target_: models.pretraining.tokenizer.pairedAntibodyTokenizer  # ← updated
  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-4
  lr_scheduler:
    _target_: transformers.get_linear_schedule_with_warmup
    num_warmup_steps: 10
    num_training_steps: 10
train:
  seed: 42
  gradient_clip: 10.0
  min_epochs: 50
  max_epochs: 50
  early_stop_patience: 0
  batch_size: 32       # reduced for longer paired sequences
  val_interval: 1.0
  log_interval: 10
  workers: 4
  ngpu: 1
data:
  dataset_suffix: MSA
  splits: [train, validation]