name: mdlm_antibody
model:
  _target_: models.pretraining.model.mdlm_diffusion.MDLMDiffusion
  config:
    mode: train
    diffusion: absorbing_state
    backbone: dit
    parameterization: subs
    time_conditioning: False
    T: 0
    subs_masking: False
    seed: 1
    eval_batch_size: 512

    training:
      ema: 0.9999
      antithetic_sampling: True
      importance_sampling: False
      sampling_eps: 1e-3
      change_of_variables: False

    optim:
      weight_decay: 0
      lr: 3e-4
      beta1: 0.9
      beta2: 0.999
      eps: 1e-8

    sampling:
      predictor: ddpm_cache
      steps: 128
      noise_removal: True
      num_sample_batches: 2
      num_sample_log: 2

    model:
      name: tiny
      type: ddit
      hidden_size: 512
      cond_dim: 128
      length: 512        # max heavy (~220) + | (1) + max light (~220) + buffer
      n_blocks: 8
      n_heads: 8
      scale_by_sigma: True
      dropout: 0.1
      tie_word_embeddings: False

    loader:
      batch_size: 32     # reduced for longer paired sequences
      num_workers: 4
      pin_memory: True

    noise:
      type: loglinear
      sigma_min: 1e-4
      sigma_max: 20

    lr_scheduler:
      _target_: transformers.get_constant_schedule_with_warmup
      num_warmup_steps: 5000

  tokenizer:
    _target_: models.pretraining.tokenizer.pairedAntibodyTokenizer

trainer:
  _target_: pytorch_lightning.Trainer
  num_nodes: 1
  devices: 1
  gradient_clip_val: 1.0
  precision: 'bf16'
  num_sanity_val_steps: 2
  max_epochs: 100
  log_every_n_steps: 10
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  val_check_interval: 1.0

train:
  ngpu: 1
  batch_size: 32
  workers: 4
  seed: 42

data:
  dataset_suffix: MSA
  splits: [train, validation]